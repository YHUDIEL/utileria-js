<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utilería JS - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="contenedor">
        <h1>Iniciar Sesión</h1>
        <p class="subtitulo">Ingresa tu correo y contraseña para acceder.</p>

        <form onsubmit="iniciarSesion(); return false;">
            <div class="campo">
                <label for="correo">Correo Electrónico</label>
                <input type="text" id="correo" placeholder="Ej: yhudiel@gmail.com">
                <span class="error" id="errCorreo">Formato de correo inválido.</span>
            </div>

            <div class="campo">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 8 caracteres">
                <span class="error" id="errPassword">Debe tener mayúscula, minúscula, número y carácter especial (mín. 8 caracteres).</span>
            </div>

            <button type="submit">Entrar</button>
        </form>

        <p class="subtitulo" style="margin-top:16px; text-align:center;">
            ¿No tienes cuenta? <a href="index.html" style="color:#2c3e50; font-weight:600;">Regístrate</a>
        </p>
    </div>

    <script src="js/utileria.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
